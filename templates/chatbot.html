<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatbot | EaseFindBooks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
  --color-bg-main: grey;
  --color-bg-glass:#B3C8CF;
  --color-text-main: #e6e6e6;
  --color-accent: #ae89fa;
  --color-accent-light:#89a8b2;
  --color-accent-dark: #8c6cd9;
  --color-navbar: rgba(35, 36, 58, 0.9);
  --color-navbar-border: rgba(255, 255, 255, 0.1);
  --color-card-hover: rgba(170, 172, 218, 0.7);
  --color-glass-border: #3a4044;
  --color-glass-shadow: rgba(58, 61, 65, 0.1);
  --color-glass-text: rgba(230, 230, 230, 0.9);
}
body {
  background: rgba(230, 230, 230, 0.9);
  color: var(--color-text-main);
  background-image: linear-gradient(135deg, #9FB3DF 0%, #BDDDE4 40%, #9EC6F3 100%);
  background-blend-mode: overlay;
}
.glass,
.section-box,
.login-box,
.chatbot-box {
  background: var(--color-bg-glass);
  color: var(--color-text-main);
  border: 1px solid var(--color-glass-border);
  box-shadow: 0 8px 32px 0 var(--color-glass-shadow);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
.navbar, .sidebar-custom {
  background: var(--color-navbar) !important;
  color: var(--color-text-main);
  border-bottom: 2px solid var(--color-navbar-border);
}
.navbar .nav-link, .navbar-brand, .sidebar-custom .nav-link {
  color: #fff !important;
}
.navbar .nav-link.active, .navbar .nav-link:hover,
.sidebar-custom .nav-link.active, .sidebar-custom .nav-link:hover {
  color: var(--color-accent) !important;
  background: var(--color-card-hover);
}
.card, .playlist-card {
  background: var(--color-accent-light) !important;
  color: #fff !important;
  border: 3px solid var(--color-glass-border) !important;
}
.card-title, .section-title, h2 {
  color: #fff;
}
.card-text {
  color: whitesmoke;
}
.btn-outline-primary {
  color: whitesmoke;
  border-color: var(--color-accent) !important;
  background: var(--color-bg-glass);
}
.btn-outline-primary:hover, .btn-outline-primary:focus {
  background: var(--color-accent) !important;
  color: #fff !important;
  border-color: var(--color-accent) !important;
}
.btn-outline-secondary {
  color: var(--color-accent-light) !important;
  border-color: var(--color-accent-light) !important;
  background: transparent !important;
}
.btn-outline-secondary:hover, .btn-outline-secondary:focus {
  background: var(--color-accent-light) !important;
  color: var(--color-bg-main) !important;
  border-color: var(--color-accent-light) !important;
}
input, textarea, select {
  background: #fff !important;
  color: #000 !important;
  border: 1px solid #444 !important;
}
::-webkit-scrollbar-thumb {
  background: var(--color-accent);
}

    /* ── Sidebar — identical to index.html ── */
    .sidebar-custom {
      min-height: 100vh;
      border-right: 2px solid var(--color-navbar-border);
      position: fixed;
      top: 0; left: 0;
            z-index: 1040;
      padding-top: 70px;
      box-shadow: 0 4px 24px rgba(20,22,25,0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .sidebar-custom .nav-link {
      color: white;
      margin-bottom: 8px;
      border-radius: 6px;
      transition: 0.2s;
      font-weight: 500;
    }
    @media (min-width: 992px) {
      .navbar {  width: 100%; z-index: 1050; }
      .chatbot-wrapper {  }
    }
    @media (max-width: 991px) {
      .sidebar-custom { position: static; width: 100%; min-height: auto; border-right: none; padding-top: 0; }
      .chatbot-wrapper { margin-left: 0; }
    }

    /* ── Chatbot — pixel-perfect from original ── */
    .chatbot-container {
      max-width: 480px;
      margin: 60px auto 0 auto;
      background: var(--color-bg-glass);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--color-glass-border);
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 600px;
      color: var(--color-text-main);
    }
    .chat-header {
      background: var(--color-navbar);
      color: #fff;
      padding: 18px 0;
      font-size: 1.4rem;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--color-glass-border);
    }
    .chat-box {
      flex-grow: 1;
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: transparent;
    }
    .message {
      max-width: 80%;
      padding: 12px 18px;
      border-radius: 18px;
      line-height: 1.5;
      position: relative;
      animation: fadeIn 0.25s ease-in;
      word-wrap: break-word;
      font-size: 1rem;
      background: rgba(255,255,255,0.10);
      color: #fff;
      box-shadow: 0 2px 8px rgba(20,22,25,0.07);
    }
    .message.user {
      align-self: flex-end;
      background: var(--color-navbar);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.18);
      color: var(--color-navbar);
      border-bottom-left-radius: 4px;
      padding-left: 38px;
      position: relative;
    }
    .message.bot::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 16px;
      width: 18px;
      height: 18px;
      background: url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/robot.svg') no-repeat center center/contain;
      background-image: url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/book.svg');
      opacity: 0.7;
    }
    .chat-input-area {
      display: flex;
      padding: 16px;
      border-top: 1px solid var(--color-glass-border);
      background: rgba(44,46,58,0.90);
    }
    .chat-input-area input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 24px;
      font-size: 1rem;
      background: rgba(255,255,255,0.10);
      color: #fff;
      outline: none;
      margin-right: 10px;
    }
    .chat-input-area input[type="text"]:focus {
      background: #23243a;
      color: #fff;
      box-shadow: 0 0 0 0.2rem rgba(10,33,192,0.15);
    }
    .chat-input-area button {
      padding: 0 18px;
      border: none;
      background: var(--color-navbar);
      color: #fff;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      height: 48px;
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-input-area button:hover {
      background: var(--color-accent-dark);
      color: #fff;
    }
    .chat-input-area {
      color: var(--color-glass-border);
    }

    /* book result card inside chat — same glass style as project */
    .chat-book-result {
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--color-glass-border);
      border-radius: 12px;
      padding: 10px 12px;
      margin-top: 6px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .chat-book-result img {
      width: 56px;
      height: 80px;
      object-fit: cover;
      border-radius: 5px;
      flex-shrink: 0;
      border: 1px solid var(--color-glass-border);
    }
    .chat-book-result .bk-info { flex: 1; }
    .chat-book-result .bk-title {
      font-weight: 700;
      color: var(--color-navbar);
      font-size: 0.93rem;
      margin-bottom: 3px;
    }
    .chat-book-result .bk-author {
      color: #555;
      font-size: 0.83rem;
      margin-bottom: 4px;
    }
    .chat-book-result .bk-meta {
      font-size: 0.78rem;
      color: #777;
    }
    .similar-label {
      font-size: 0.82rem;
      color: #555;
      margin-top: 10px;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .similar-books {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }
    .sim-chip {
      background: rgba(255,255,255,0.15);
      border: 1px solid var(--color-glass-border);
      border-radius: 8px;
      padding: 5px 7px;
      width: 86px;
      text-align: center;
    }
    .sim-chip img {
      width: 100%;
      height: 62px;
      object-fit: cover;
      border-radius: 5px;
      display: block;
      margin-bottom: 3px;
    }
    .sim-chip .sim-t {
      font-size: 0.68rem;
      color: var(--color-navbar);
      font-weight: 600;
      line-height: 1.2;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sim-chip .sim-a {
      font-size: 0.63rem;
      color: #666;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
    .chat-box::-webkit-scrollbar { width: 6px; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--color-card-hover); border-radius: 3px; }
    @media (max-width: 600px) {
      .chatbot-container { max-width: 98vw; min-height: 80vh; }
      .chat-header { font-size: 1.1rem; padding: 12px 0; }
      .chat-input-area { padding: 10px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar — identical structure to original index.html sidebar -->
</div>

    <!-- Navbar: always flat, never collapses. 3-dash opens sidebar offcanvas -->
  <nav class="navbar" style="position:sticky;top:0;z-index:1050;">
    <div class="container-fluid d-flex align-items-center gap-2 px-3">
      <button class="btn btn-link p-0 me-1" type="button"
              data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas"
              style="color:#fff;font-size:1.6rem;line-height:1;text-decoration:none;border:none;">
        <i class="bi bi-list"></i>
      </button>
      <a class="navbar-brand me-auto mb-0" href="/"><i class="bi bi-book-half"></i> EaseFindBooks</a>
      <form class="d-flex flex-grow-1 mx-2" action="/recommend_books" method="post"
            class="nav-search-form">
        <input class="form-control form-control-sm me-1" type="text" name="user_input"
               placeholder="Search books..." required>
        <button class="btn btn-outline-primary btn-sm" type="submit"><i class="bi bi-search"></i></button>
      </form>
      {% if session.name %}
        <div class="dropdown">
          <a class="dropdown-toggle p-0" href="#" role="button" data-bs-toggle="dropdown"
             style="color:#fff;text-decoration:none;">
            <i class="bi bi-person-circle" style="font-size:1.8rem;vertical-align:middle;"></i>
          </a>
          <ul class="dropdown-menu dropdown-menu-end" style="min-width:160px;">
            <li><a class="dropdown-item" href="/profile"><i class="bi bi-person me-2"></i>My Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      {% else %}
        <a href="/login" style="color:#ae89fa;font-weight:600;white-space:nowrap;font-size:0.93rem;text-decoration:none;">
          <i class="bi bi-box-arrow-in-right"></i> Login
        </a>
      {% endif %}
    </div>
  </nav>

  <!-- Sidebar Offcanvas -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas"
       style="width:240px;background:var(--color-navbar);color:#fff;">
    <div class="offcanvas-header" style="border-bottom:1px solid rgba(255,255,255,0.12);">
      <span class="fw-bold fs-6"><i class="bi bi-book-half me-2"></i>EaseFindBooks</span>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0 pt-2">
      <ul class="nav nav-pills flex-column px-2">
        <li><a href="/" class="nav-link text-white"><i class="bi bi-house-door-fill me-2"></i>Home</a></li>
        <li><a href="/recommend" class="nav-link text-white"><i class="bi bi-search me-2"></i>FindBook</a></li>
        <li><a href="/select_mood" class="nav-link text-white"><i class="bi bi-emoji-smile me-2"></i>GetByMood</a></li>
        <li><a href="/chatbot" class="nav-link text-white"><i class="bi bi-robot me-2"></i>Chatbot</a></li>
        <li><a href="/book" class="nav-link text-white"><i class="bi bi-cloud-download me-2"></i>Download Books</a></li>
        <li><a href="/contact" class="nav-link text-white"><i class="bi bi-envelope me-2"></i>Contact</a></li>
        <li class="mt-2">
          {% if session.name %}
            <a href="/profile" class="nav-link text-white"><i class="bi bi-person-circle me-2"></i>My Profile</a>
            <a href="/logout" class="nav-link text-danger"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
          {% else %}
            <a href="/login" class="nav-link text-white"><i class="bi bi-box-arrow-in-right me-2"></i>Login</a>
          {% endif %}
        </li>
      </ul>
      <hr style="border-color:rgba(255,255,255,0.15);margin:16px 8px 8px;">
      <div class="small px-3" style="color:rgba(255,255,255,0.45);">&copy; {{ year }} EaseFindBooks</div>
    </div>
  </div>

  <div class="chatbot-wrapper">
    <div class="chatbot-container glass mt-4">
      <div class="chat-header"><i class="bi bi-robot"></i> BookBot</div>
      <div class="chat-box" id="chat-box"></div>
      <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Ask about a book..." autocomplete="off" />
        <button onclick="handleUserInput()" title="Send"><i class="bi bi-send"></i></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const chatBox = document.getElementById('chat-box');
    const input   = document.getElementById('user-input');

    // Greeting on load
    window.addEventListener('load', function() {
      appendMessage('bot',
        '<strong>Hi! I\'m BookBot 📚</strong><br>' +
        'Type a book title and I\'ll look it up in our database and suggest similar reads.'
      );
    });

    function appendMessage(sender, htmlContent) {
      const div = document.createElement('div');
      div.classList.add('message', sender === 'user' ? 'user' : 'bot');
      div.innerHTML = htmlContent;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    async function handleUserInput() {
      const bookTitle = input.value.trim();
      if (!bookTitle) return;

      appendMessage('user', bookTitle);
      input.value = '';

      const typingDiv = appendMessage('bot',
        "<span style='color:#3c009d'><i class='bi bi-search'></i> Searching for the exact book...</span>"
      );

      try {
        const res  = await fetch('/chatbot_search?q=' + encodeURIComponent(bookTitle));
        const data = await res.json();
        typingDiv.remove();

        if (data.error) {
          appendMessage('bot',
            "<span style='color:#b02a37'><i class='bi bi-x-circle'></i> " + data.error + "</span>"
          );
          return;
        }

        // Main book card — same glass aesthetics as project
        let html = '<div class="chat-book-result">' +
          '<img src="' + (data.image || 'https://via.placeholder.com/56x80?text=No+Cover') + '" ' +
               'alt="' + data.title + '" ' +
               'onerror="this.src=\'https://via.placeholder.com/56x80?text=No+Cover\'">' +
          '<div class="bk-info">' +
            '<div class="bk-title">' + data.title + '</div>' +
            '<div class="bk-author"><i class="bi bi-person-fill"></i> ' + data.author + '</div>' +
            (data.year      ? '<div class="bk-meta"><i class="bi bi-calendar3"></i> ' + data.year + '</div>' : '') +
            (data.publisher ? '<div class="bk-meta"><i class="bi bi-building"></i> ' + data.publisher + '</div>' : '') +
          '</div>' +
        '</div>';

        if (data.similar && data.similar.length > 0) {
          html += '<div class="similar-label"><i class="bi bi-stars"></i> You might also like:</div>' +
                  '<div class="similar-books">';
          data.similar.forEach(function(b) {
            html += '<div class="sim-chip">' +
              '<img src="' + b.image + '" alt="' + b.title + '" ' +
                   'onerror="this.src=\'https://via.placeholder.com/86x62?text=No+Cover\'">' +
              '<span class="sim-t" title="' + b.title + '">' + b.title + '</span>' +
              '<span class="sim-a" title="' + b.author + '">' + b.author + '</span>' +
            '</div>';
          });
          html += '</div>';
        }

        appendMessage('bot', html);

      } catch (err) {
        typingDiv.remove();
        console.error(err);
        appendMessage('bot',
          "<span style='color:#b02a37'><i class='bi bi-exclamation-triangle'></i> " +
          "Something went wrong while fetching the book.</span>"
        );
      }
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); handleUserInput(); }
    });
  </script>
</body>
</html>
