<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | EaseFindBooks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
 <style>
:root {
  --color-bg-main: grey;
  --color-bg-glass:#B3C8CF;
  --color-text-main: #000;
  --color-accent: #1b263b;
  --color-accent-light:#89a8b2;
  --color-accent-dark: #8c6cd9;
  --color-navbar: rgba(35, 36, 58, 0.9);
  --color-navbar-border: rgba(255, 255, 255, 0.1);
  --color-card-hover: rgba(170, 172, 218, 0.7);
  --color-glass-border: #3a4044;
  --color-glass-shadow: rgba(58, 61, 65, 0.1);
  --color-glass-text: rgba(14, 14, 14, 0.9);
}
body {
  background:#415a77;
  color: #1b263b;
  background-image: linear-gradient(135deg, #9FB3DF 0%, #BDDDE4 40%, #9EC6F3 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: var(--color-bg-glass);
  box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 16px;
  border: 1px solid var(--color-glass-border);
  padding: 2rem 2.5rem;
  width: 100%;
  max-width: 400px;
}
h2 {
  color: var(--color-accent);
  text-align: center;
  margin-bottom: 1.5rem;
}
.form-label {
  color: var(--color-accent);
}
.form-control {
  background: #fff;
  color: #000;
  border: 1px solid #444;
}
.btn-primary {
  background: var(--color-accent);
  border: none;
  color: #fff;
  font-weight: 600;
}
.btn-primary:hover {
  background: var(--color-accent);
  color: #fff;
}
a {
  color: var(--color-accent);
}
a:hover {
  color: #000;
}
.alert {
  background: var(--color-card-hover);
  color: #23243a;
  border: 1px solid var(--color-accent-light);
}
</style>
</head>
<body>
  <div class="login-box">
    <h2 class="mb-4 text-center">Login</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="/login">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <div class="mt-3 text-center">
      <span>Don't have an account? <a href="/signup">Sign up</a></span>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
