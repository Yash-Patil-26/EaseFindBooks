<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | EaseFindBooks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --color-bg-main: #415a77;
      --color-bg-glass: #B3C8CF;
      --color-text-main: #000;
      --color-accent: #1b263b;
      --color-accent-light: #89a8b2;
      --color-accent-dark: #8c6cd9;
      --color-navbar: rgba(35, 36, 58, 0.9);
      --color-navbar-border: rgba(255, 255, 255, 0.1);
      --color-card-hover: rgba(170, 172, 218, 0.7);
      --color-glass-border: #3a4044;
      --color-glass-shadow: rgba(58, 61, 65, 0.1);
    }

    body {
      background: var(--color-bg-main);
      background-image: linear-gradient(135deg, #9FB3DF 0%, #BDDDE4 40%, #9EC6F3 100%);
      color: var(--color-text-main);
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
    }

    .glass,
    .signup-container {
      background: var(--color-bg-glass);
      color: var(--color-text-main);
      border: 1px solid var(--color-glass-border);
      box-shadow: 0 8px 32px 0 var(--color-glass-shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
    }

    .navbar {
      background: var(--color-navbar) !important;
      border-bottom: 2px solid var(--color-navbar-border);
      color: #fff;
    }

    .navbar .navbar-brand {
      color: #fff !important;
      font-weight: bold;
      font-size: 1.6rem;
    }

    .signup-container {
      max-width: 420px;
      margin: 60px auto;
      padding: 36px 32px 28px 32px;
    }

    .signup-title {
      color: var(--color-accent);
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 28px;
    }

    .form-label {
      font-weight: 500;
    }

    .form-control {
      background: #fff !important;
      color: #000 !important;
      border: 1px solid #444 !important;
      border-radius: 8px;
    }

    .form-control:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 0.2rem rgba(10,33,192,0.15);
    }

    .btn-signup {
      background: var(--color-accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .btn-signup:hover {
      background: var(--color-accent-light);
    }

    .alert {
      border-radius: 8px;
      font-size: 1rem;
      background: var(--color-accent-dark);
      color: #fff;
      border: 1px solid var(--color-accent);
    }

    a.login-link {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 500;
    }

    a.login-link:hover {
      color: var(--color-accent-light);
      text-decoration: underline;
    }

    footer {
      background: var(--color-bg-glass);
      color: var(--color-text-main);
      padding: 32px 0 0 0;
      margin-top: 48px;
      border-top: 2px solid var(--color-navbar-border);
    }

    footer a {
      color: var(--color-accent);
      text-decoration: none;
      margin-right: 12px;
    }

    footer a:hover {
      color: var(--color-accent-dark);
      text-decoration: underline;
    }

    ::-webkit-scrollbar {
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-accent);
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="/"><i class="bi bi-book-half"></i> EaseFindBooks</a>
    </div>
  </nav>

  <div class="signup-container glass">
    <h2 class="signup-title">Sign Up</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/signup">
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
      </div>
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phone" name="phone" pattern="[0-9]{10,15}" maxlength="15" placeholder="Enter your phone number" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <div class="mb-3">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
      </div>
      <button type="submit" class="btn btn-signup w-100 mt-2">Sign Up</button>
    </form>

    <div class="text-center mt-3">
      <span>Already have an account?</span>
      <a href="/login" class="login-link">Login</a>
    </div>
  </div>

  <footer class="mt-5 py-4">
    <div class="container text-center">
      <div class="mb-2">
        <a href="/" class="me-3"><i class="bi bi-house-door-fill"></i> Home</a>
        <a href="/recommend" class="me-3">FindBook</a>
        <a href="/select_mood" class="me-3">GetByMood</a>
      </div>
      <div>
        &copy; {{ year }} EaseFindBooks. All rights reserved.
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
